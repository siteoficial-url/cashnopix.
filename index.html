<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASH NO PIX - Confirmação</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .container {
            background-color: #1a1a1a;
            padding: 40px 25px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.2);
            width: 100%;
            max-width: 480px;
            border: 1px solid #333;
        }

        h1 {
            color: #00ff00;
            font-size: 1.8em;
            margin-bottom: 15px;
            font-weight: 800;
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #d1d1d1;
        }

        h2 {
            font-size: 1.2em;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* AJUSTE NO BOTÃO WHATSAPP */
        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 22px 10px;
            background-color: #25D366;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.4em;
            font-weight: bold;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
            animation: pulse 1.8s infinite;
            transition: transform 0.2s, background-color 0.3s;
        }

        .btn-whatsapp:hover {
            transform: scale(1.03);
            background-color: #2ee676;
        }

        .whatsapp-icon {
            margin-right: 12px;
            font-size: 1.2em;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SUPORTE SOLICITADO!</h1>

        <p>
            Você será atendido agora!<br>
            Para suporte ou cadastro no aplicativo oficial, clique abaixo:
        </p>

        <h2>CLIQUE PARA INICIAR:</h2>

        <a href="https://w.app/qcjfd8"
           target="_blank"
           rel="noopener noreferrer"
           class="btn-whatsapp">
            <span class="whatsapp-icon">📲</span> ABRIR SUPORTE AGORA
        </a>
    </div>

</body>
</html>
